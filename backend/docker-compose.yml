version: "3.8"

services:
  # PostgreSQL Database (Local Development Only)
  # For production, use Aiven Cloud PostgreSQL or external database
  postgres:
    image: postgres:15-alpine
    container_name: cosmicforge-db
    environment:
      POSTGRES_USER: cosmicforge
      POSTGRES_PASSWORD: cosmicforge123
      POSTGRES_DB: cosmicforge_rtc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosmicforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cosmicforge-network

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicforge-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Override DATABASE_URL for local development with Docker PostgreSQL
      # Comment this out if using external database (e.g., Aiven Cloud)
      DATABASE_URL: postgresql://cosmicforge:cosmicforge123@postgres:5432/cosmicforge_rtc
      HOST: 0.0.0.0
      PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cosmicforge-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  cosmicforge-network:
    driver: bridge
